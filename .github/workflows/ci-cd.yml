name: ConfigMaster CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run tests
      run: |
        cd backend
        export DATABASE_URL=postgresql://test:test@localhost:5432/test
        python -m pytest tests/ -v

    - name: Run linting
      run: |
        cd backend
        pip install flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run tests
      run: |
        cd frontend
        npm run test

    - name: Run linting
      run: |
        cd frontend
        npm run lint

    - name: Type check
      run: |
        cd frontend
        npm run type-check

    - name: Build
      run: |
        cd frontend
        npm run build

  test-discovery:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd discovery
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: |
        cd discovery
        python -m pytest tests/ -v

  security-scan:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-discovery]

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-discovery, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        component: [backend, frontend, discovery]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix=main-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region us-west-2 --name configmaster-staging

    - name: Deploy to staging
      run: |
        # Update image tags in Kubernetes manifests
        sed -i "s|configmaster/backend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml
        sed -i "s|configmaster/frontend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml
        sed -i "s|configmaster/discovery:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/discovery:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml

        # Apply Kubernetes manifests
        kubectl apply -f infrastructure/kubernetes/configmaster.yaml

        # Wait for deployment to complete
        kubectl rollout status deployment/configmaster-backend -n configmaster --timeout=300s
        kubectl rollout status deployment/configmaster-frontend -n configmaster --timeout=300s

    - name: Run smoke tests
      run: |
        # Get the load balancer URL
        LB_URL=$(kubectl get ingress configmaster-ingress -n configmaster -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        # Wait for load balancer to be ready
        for i in {1..30}; do
          if curl -f "http://$LB_URL/health" > /dev/null 2>&1; then
            echo "Health check passed"
            break
          fi
          echo "Waiting for application to be ready... ($i/30)"
          sleep 10
        done

        # Run basic API tests
        curl -f "http://$LB_URL/api/health" || exit 1
        curl -f "http://$LB_URL/api/statistics" || exit 1

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region us-west-2 --name configmaster-prod

    - name: Deploy to production
      run: |
        # Update image tags in Kubernetes manifests
        sed -i "s|configmaster/backend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml
        sed -i "s|configmaster/frontend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml
        sed -i "s|configmaster/discovery:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/discovery:main-${{ github.sha }}|g" infrastructure/kubernetes/configmaster.yaml

        # Apply Kubernetes manifests with production settings
        kubectl apply -f infrastructure/kubernetes/configmaster.yaml

        # Wait for deployment to complete
        kubectl rollout status deployment/configmaster-backend -n configmaster --timeout=600s
        kubectl rollout status deployment/configmaster-frontend -n configmaster --timeout=600s

    - name: Post-deployment verification
      run: |
        # Get the load balancer URL
        LB_URL=$(kubectl get ingress configmaster-ingress -n configmaster -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

        # Comprehensive health checks
        curl -f "http://$LB_URL/api/health" || exit 1
        curl -f "http://$LB_URL/api/statistics" || exit 1

        # Check if discovery is working
        kubectl logs -n configmaster deployment/configmaster-discovery --tail=50

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "ConfigMaster has been successfully deployed to production! 🚀"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: success()

    - name: Notify deployment failure
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "ConfigMaster production deployment failed! ❌"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: failure()